<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'nonce-${nonce}'; connect-src ${cspConnectSrc};">
    <title>测试案例</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
            color: var(--vscode-editor-foreground, #1a1a1a);
            background: var(--vscode-editor-background, #f5f6f8);
            font-size: 13px;
        }
        .header { margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
        .header h2 { font-size: 16px; font-weight: 600; color: #1a1a1a; }

        .scope-meta {
            display: flex;
            gap: 24px;
            margin-bottom: 14px;
            padding: 10px 16px;
            background: #f7f8fa;
            border: 1px solid #e5e9ef;
            border-radius: 6px;
            flex-wrap: wrap;
        }
        .scope-meta .sm-item { display: flex; align-items: center; gap: 6px; }
        .scope-meta .sm-label { color: #888; font-size: 12px; }
        .scope-meta .sm-value { color: #1a1a1a; font-weight: 600; font-size: 13px; }
        .scope-meta .sm-value strong { color: #0052d9; }

        .case-toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 10px 14px;
            background: #f7f8fa;
            border: 1px solid #e5e9ef;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            flex-wrap: wrap;
        }
        .case-search {
            display: flex;
            align-items: center;
            background: #fff;
            border: 1px solid #dde3ea;
            border-radius: 4px;
            padding: 0 8px;
            height: 30px;
            min-width: 200px;
        }
        .case-search .ic { color: #999; font-size: 13px; margin-right: 4px; }
        .case-search input {
            border: none;
            outline: none;
            background: transparent;
            font-size: 13px;
            color: #333;
            width: 100%;
        }
        .filter-select {
            height: 30px;
            padding: 0 8px;
            border: 1px solid #dde3ea;
            border-radius: 4px;
            background: #fff;
            color: #333;
            font-size: 12.5px;
            outline: none;
            min-width: 90px;
        }
        .filter-select:focus { border-color: #0052d9; }
        .btn-sm {
            height: 30px;
            padding: 0 14px;
            border: 1px solid #dde3ea;
            border-radius: 4px;
            background: #fff;
            color: #333;
            font-size: 12.5px;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-sm:hover { border-color: #0052d9; color: #0052d9; }
        .btn-primary {
            background: #0052d9;
            color: #fff;
            border-color: #0052d9;
        }
        .btn-primary:hover { background: #003cab; color: #fff; }

        .table-scroll {
            overflow-x: auto;
            border: 1px solid #e5e9ef;
            border-radius: 0 0 6px 6px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 12px;
            min-width: 900px;
        }
        th, td {
            padding: 7px 12px;
            text-align: left;
            white-space: nowrap;
            border-bottom: 1px solid #f0f2f5;
        }
        th {
            background: #f7f8fa;
            font-weight: 600;
            color: #333;
            position: sticky;
            top: 0;
            z-index: 1;
            font-size: 12px;
        }
        tr:hover td { background: #f0f6ff; }
        .case-code {
            color: #0052d9;
            font-family: "SF Mono", "Menlo", monospace;
            font-size: 11.5px;
            font-weight: 500;
            cursor: pointer;
        }
        .case-code:hover { text-decoration: underline; }
        .case-name-cell .name { font-weight: 500; color: #1a1a1a; }
        .case-name-cell .path { font-size: 10.5px; color: #999; margin-top: 2px; }
        .case-desc { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: pre-wrap; color: #666; }

        .priority {
            display: inline-block;
            padding: 1px 7px;
            font-size: 10.5px;
            border-radius: 2px;
            font-weight: 500;
        }
        .pri-high { background: #fde2e3; color: #e34d59; }
        .pri-mid { background: #fff3e0; color: #e37318; }
        .pri-low { background: #e8f8f0; color: #2ba471; }

        .case-type-tag {
            display: inline-block;
            padding: 1px 7px;
            font-size: 10.5px;
            border-radius: 2px;
            font-weight: 500;
        }
        .tag-blue { background: #e8f3ff; color: #0052d9; }
        .tag-green { background: #e8f8f0; color: #2ba471; }
        .tag-orange { background: #fff3e0; color: #e37318; }
        .tag-purple { background: #f3e8ff; color: #7b3fe4; }
        .tag-red { background: #fde2e3; color: #e34d59; }
        .tag-cyan { background: #e8fafe; color: #0099cc; }

        .owner-cell { display: flex; align-items: center; gap: 6px; }
        .avatar-mini {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px; height: 20px;
            border-radius: 50%;
            font-size: 10px;
            font-weight: 500;
            color: #fff;
            flex-shrink: 0;
        }

        .loading {
            text-align: center;
            padding: 60px 0;
            color: #999;
            font-size: 14px;
        }
        .error {
            padding: 10px 14px;
            background: #fde2e3;
            border: 1px solid #e34d59;
            border-radius: 4px;
            margin-bottom: 16px;
            color: #e34d59;
            font-size: 13px;
        }
        .empty {
            text-align: center;
            padding: 60px 0;
            color: #999;
        }
        .hidden { display: none; }

        .pagination {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 14px;
            flex-wrap: wrap;
            font-size: 13px;
            justify-content: flex-end;
        }
        .pagination .pg-total {
            color: #999;
            margin-right: 12px;
            font-size: 12.5px;
        }
        .page-btn {
            min-width: 28px;
            height: 28px;
            padding: 0 6px;
            border: 1px solid #dde3ea;
            border-radius: 4px;
            background: #fff;
            color: #333;
            cursor: pointer;
            font-size: 12px;
            text-align: center;
        }
        .page-btn:hover { border-color: #0052d9; color: #0052d9; }
        .page-btn.active { background: #0052d9; color: #fff; border-color: #0052d9; }
        .page-btn:disabled { opacity: 0.35; cursor: default; }
        .page-btn:disabled:hover { border-color: #dde3ea; color: #333; }

        .page-size {
            margin-left: 8px;
            height: 28px;
            padding: 0 8px;
            border: 1px solid #dde3ea;
            border-radius: 4px;
            background: #fff;
            color: #333;
            font-size: 12px;
            outline: none;
        }
        .page-size:focus { border-color: #0052d9; }
        .pg-jump {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #666;
            font-size: 12.5px;
            margin-left: 8px;
        }
        .pg-jump input {
            width: 40px;
            height: 28px;
            padding: 0 4px;
            border: 1px solid #dde3ea;
            border-radius: 4px;
            background: #fff;
            color: #333;
            font-size: 12px;
            text-align: center;
            outline: none;
        }
        .pg-jump input:focus { border-color: #0052d9; }
    </style>
</head>
<body>
    <div class="header">
        <h2>基本信息</h2>
    </div>

    <div class="scope-meta" id="scopeMeta">
        <div class="sm-item"><span class="sm-label">测试任务</span><span class="sm-value" id="infoTaskName">-</span></div>
        <div class="sm-item"><span class="sm-label">子测试任务</span><span class="sm-value" id="infoSubTaskName">-</span></div>
        <div class="sm-item"><span class="sm-label">测试阶段</span><span class="sm-value" id="infoPhaseName">-</span></div>
    </div>

    <div class="case-toolbar">
        <div class="case-search" style="min-width:150px">
            <span class="ic">&#128269;</span>
            <input id="filterTestCaseNo" placeholder="编号" />
        </div>
        <div class="case-search" style="min-width:150px">
            <span class="ic">&#128269;</span>
            <input id="filterTestCaseName" placeholder="名称" />
        </div>
        <div class="case-search" style="min-width:150px">
            <span class="ic">&#128269;</span>
            <input id="filterTestCasePath" placeholder="路径" />
        </div>
        <select id="filterPriority" class="filter-select">
            <option value="">全部优先级</option>
            <option value="高">高</option>
            <option value="中">中</option>
            <option value="低">低</option>
        </select>
        <select id="filterTestType" class="filter-select">
            <option value="">全部执行方式</option>
            <option value="手工">手工</option>
            <option value="自动化">自动化</option>
            <option value="半自动化">半自动化</option>
        </select>
        <select id="filterType" class="filter-select">
            <option value="">全部案例类型</option>
            <option value="算法类">算法类</option>
            <option value="批处理类">批处理类</option>
            <option value="可用性检查类">可用性检查类</option>
            <option value="安全类">安全类</option>
            <option value="数据仓库类">数据仓库类</option>
            <option value="流程类">流程类</option>
            <option value="功能点类">功能点类</option>
            <option value="界面类">界面类</option>
            <option value="报文接口类">报文接口类</option>
            <option value="其他">其他</option>
            <option value="报表统计类">报表统计类</option>
        </select>
        <button class="btn-sm" id="resetBtn">重置</button>
    </div>

    <div id="loading" class="loading hidden">查询中...</div>
    <div id="error" class="error hidden"></div>

    <div id="tableWrap" class="table-scroll hidden"></div>

    <div id="pagination" class="pagination hidden"></div>

    <script nonce="${nonce}" src="${httpClientUri}"></script>
    <script nonce="${nonce}" src="${scriptUri}"></script>
</body>
</html>
