<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src ${cspSource} 'unsafe-inline'; script-src ${cspSource} 'nonce-${nonce}';">
<title>CSV文件浏览</title>
<!-- 引入公共样式 -->
<link rel="stylesheet" href="${mediaBase}/common/styles/common.css">
<style>
/* 页面特定样式 */
.container{display:flex;flex:1;overflow:hidden;gap:12px;padding:12px}
.left-panel{width:260px;flex-shrink:0;display:flex;flex-direction:column;background:#fff;border:1px solid #e5e9ef;border-radius:6px;overflow:hidden}
.right-panel{flex:1;display:flex;flex-direction:column;background:#fff;border:1px solid #e5e9ef;border-radius:6px;overflow:hidden}

/* CSV表格特定样式 */
.csv-header{padding:10px 14px;border-bottom:1px solid #e5e9ef;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.csv-title{font-size:13px;font-weight:600;color:#1a1a1a;display:flex;align-items:center;gap:8px}
.csv-title .filename{color:#888;font-weight:400;font-size:12px}
.csv-actions{display:flex;align-items:center;gap:10px}
.csv-body{flex:1;overflow:auto;padding:0}

/* 文件树特定样式 */
.file-tree-node{padding:6px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:12.5px;color:#333;transition:background .1s}
.file-tree-node:hover{background:#f0f6ff}
.file-tree-node.active{background:#e8f3ff;color:#0052d9}
.file-tree-node.folder{font-weight:500;color:#555}
.file-tree-node .icon{width:16px;height:16px;flex-shrink:0;text-align:center}
.file-tree-node .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-tree-empty{padding:20px;text-align:center;color:#aaa;font-size:12px}
.file-tree-loading{padding:20px;text-align:center;color:#888;font-size:12px}

/* CSV表格样式 */
.csv-table{width:100%;border-collapse:collapse;font-size:12px}
.csv-table th,.csv-table td{padding:8px 12px;text-align:left;border-bottom:1px solid #f0f2f5;white-space:nowrap}
.csv-table th{background:#fafbfc;font-weight:600;color:#555;position:sticky;top:0;z-index:1}
.csv-table tr:hover{background:#fafbfc}
.csv-table tr.selected{background:#e8f3ff}
.csv-table .checkbox{width:20px;text-align:center}
.csv-table .checkbox input{width:14px;height:14px;cursor:pointer}
.csv-table td{color:#333;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.csv-empty{padding:40px;text-align:center;color:#aaa;font-size:13px}
.csv-empty .icon{font-size:40px;margin-bottom:10px;color:#dde3ea}
.csv-loading{padding:40px;text-align:center;color:#888;font-size:12px}

/* 按钮样式 */
.btn{padding:6px 14px;font-size:12px;border-radius:4px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:4px;border:1px solid transparent}
.btn-primary{background:#0052d9;color:#fff;border-color:#0052d9}
.btn-primary:hover{background:#0041b3}
.btn-primary:disabled{background:#8a94a6;border-color:#8a94a6;cursor:not-allowed}
.btn-secondary{background:#fff;color:#555;border-color:#dde3ea}
.btn-secondary:hover{background:#f0f6ff;border-color:#0052d9;color:#0052d9}
.btn-sm{padding:4px 10px;font-size:11px}
.selected-count{font-size:11.5px;color:#888}
.selected-count strong{color:#0052d9}
</style>
</head>
<body>
<div class="container">
  <!-- 左侧文件树 -->
  <div class="left-panel">
    <div class="panel-header">
      <span>测试任务文件</span>
    </div>
    <div class="panel-body" id="fileTreeBody">
      <div class="file-tree-loading">加载中...</div>
    </div>
  </div>

  <!-- 右侧CSV表格 -->
  <div class="right-panel">
    <div class="csv-header">
      <div class="csv-title">
        <span>CSV数据</span>
        <span class="filename" id="csvFileName"></span>
      </div>
      <div class="csv-actions" id="csvActions" style="display:none">
        <span class="selected-count">已选择 <strong id="selectedRowCount">0</strong> 行</span>
        <button class="btn btn-primary btn-sm" id="sendSelectedBtn" disabled>发送勾选数据</button>
        <button class="btn btn-secondary btn-sm" id="selectAllBtn">全选</button>
        <button class="btn btn-secondary btn-sm" id="selectNoneBtn">取消全选</button>
      </div>
    </div>
    <div class="csv-body" id="csvBody">
      <div class="csv-empty">
        <div class="icon">&#128196;</div>
        <div>请从左侧选择CSV文件查看数据</div>
      </div>
    </div>
  </div>
</div>

<script type="module" nonce="${nonce}" src="${scriptUri}"></script>
<div class="toast" id="toast"></div>
</body>
</html>
