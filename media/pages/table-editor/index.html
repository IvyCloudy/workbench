<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src {{cspSource}} data:; style-src {{cspSource}} 'unsafe-inline'; script-src {{cspSource}} 'nonce-{{nonce}}';">
<link rel="stylesheet" href="{{stylesUri}}">
</head>
<body>
<div class="xs-app">
    <div class="xs-meta">
        <span class="xs-bind-tag {{bindStatusClass}}">{{bindStatusText}}</span>
        <div class="xs-meta-item"><span class="xs-meta-label">测试任务</span><span class="xs-meta-value xs-meta-task">{{testTaskNo}}</span></div>
        <div class="xs-meta-item"><span class="xs-meta-label">测试任务名称</span><span class="xs-meta-value xs-meta-taskname">{{testTaskName}}</span></div>
        <div class="xs-meta-item"><span class="xs-meta-label">子测试任务</span><span class="xs-meta-value xs-meta-subtask">{{subTestTaskName}}</span></div>
    </div>
    <div class="xs-toolbar">
        <div class="xs-text-open" data-action="openTextEditor" title="用 Text Editor 打开">
            <div class="xs-icon-btn">
                <svg viewBox="0 0 16 16"><path d="M4 1h5.5L13 4.5v9a.5.5 0 01-.5.5h-8a.5.5 0 01-.5-.5V1.5A.5.5 0 014 1zm5 .5V4h2.5L9 1.5zM5 7h5v1H5V7zm0 2h5v1H5V9zm0 2h3v1H5v-1z"/></svg>
            </div>
            <span class="xs-text-open-label">测试案例</span>
        </div>
        <div class="xs-search">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" placeholder="搜索...">
            <span id="searchClear" style="display:none;cursor:pointer;color:#999;font-size:14px;line-height:1;padding:0 2px" title="清除搜索">✕</span>
        </div>
        <div class="xs-icon-btn xs-tip xs-icon-btn-reset" id="searchReset" data-tip="重置筛选并获取最新数据" title="重置筛选并获取最新数据">
            <svg width="16" height="16" viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4a8 8 0 1 0 7.74 10h-2.08A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        </div>
        <div class="xs-icon-btn xs-tip xs-icon-btn-failed is-disabled" id="failedFilterBtn" data-tip="暂无推送失败行" title="暂无推送失败行">
            <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 4h18l-7 8.6V20l-4 2v-9.4L3 4z" fill="currentColor"/>
                <circle cx="19" cy="6" r="4" fill="#d93026"/>
                <rect x="18.25" y="3.5" width="1.5" height="3.5" fill="#fff"/>
                <rect x="18.25" y="7.5" width="1.5" height="1.5" fill="#fff"/>
            </svg>
        </div>
        <button class="xs-btn xs-btn-p" id="pushBtn" disabled>推送</button>
        <span style="flex:1"></span>
        <div class="xs-icon-btn" id="findBtn" title="查找">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <span id="selInfo" style="font-size:12px;color:#666">已选 0 行，共 0 行</span>
    </div>
    <div class="xs-container" id="tableContainer"></div>
    <div class="xs-modal-overlay" id="detailModal">
        <div class="xs-modal-dialog xs-detail-dialog-v2">
            <div class="xs-modal-header">
                <span class="xs-modal-title" id="detailModalTitle">步骤明细</span>
                <button class="xs-modal-close" id="detailModalClose" title="关闭">✕</button>
            </div>
            <div class="xs-modal-body" id="detailModalBody"></div>
            <div class="xs-modal-footer">
                <span id="detailModInfo" style="display:none;font-size:11px;color:var(--d);flex:1">明细已修改</span>
                <button class="xs-btn" id="detailCancelBtn">取消</button>
                <button class="xs-btn xs-btn-p" id="detailSaveBtn">保存</button>
            </div>
        </div>
    </div>
    <div class="xs-load" id="loading" style="display:none">
        <div class="xs-spin"></div>
    </div>
    <div class="xs-cm" id="ctxMenu"></div>
    <div class="xs-sf" id="sortFilter"></div>
    <div class="xs-find" id="findPanel">
        <div class="xs-find-row">
            <input type="text" id="findInput" placeholder="查找...">
            <button class="xs-btn xs-find-aa" id="findCaseBtn" title="区分大小写">Aa</button>
            <button class="xs-btn" id="prevBtn">上一个</button>
            <button class="xs-btn" id="nextBtn">下一个</button>
        </div>
        <div class="xs-find-row">
            <input type="text" id="replaceInput" placeholder="替换为...">
            <button class="xs-btn" id="replaceBtn">替换</button>
            <button class="xs-btn" id="replaceAllBtn">全部</button>
        </div>
        <div class="xs-find-info" id="findInfo"></div>
    </div>
    <div class="xs-toast" id="toast"></div>
    <!-- 推送结果弹窗：成功/部分成功/全部失败，由 editor.js 控制显隐 -->
    <div class="xs-modal-overlay xs-pr-overlay" id="pushResultModal">
        <div class="xs-modal-dialog xs-pr-dialog">
            <div class="xs-modal-header xs-pr-header" id="pushResultHeader">
                <span class="xs-pr-icon" id="pushResultIcon"></span>
                <span class="xs-modal-title" id="pushResultTitle">推送结果</span>
                <button class="xs-modal-close" id="pushResultClose" title="关闭">✕</button>
            </div>
            <div class="xs-pr-summary" id="pushResultSummary"></div>
            <div class="xs-modal-body xs-pr-body">
                <div class="xs-pr-list" id="pushResultList"></div>
            </div>
            <div class="xs-modal-footer">
                <span id="pushResultHint" style="flex:1;font-size:12px;color:#888"></span>
                <button class="xs-btn" id="pushResultCopyBtn" title="复制全部失败明细">复制失败明细</button>
                <button class="xs-btn xs-btn-p" id="pushResultOkBtn">确定</button>
            </div>
        </div>
    </div>
    <!-- 通用 prompt / confirm 模态（替代受 sandbox 限制的 window.prompt / window.confirm） -->
    <div class="xs-modal-overlay" id="xsPromptModal">
        <div class="xs-modal-dialog" style="width:380px;max-height:none">
            <div class="xs-modal-header">
                <span class="xs-modal-title" id="xsPromptTitle">请输入</span>
                <button class="xs-modal-close" id="xsPromptClose" title="关闭">✕</button>
            </div>
            <div class="xs-modal-body" style="padding:16px;min-height:auto">
                <input type="text" id="xsPromptInput" style="width:100%;padding:6px 8px;border:1px solid #ccc;border-radius:3px;outline:none;font-size:13px">
            </div>
            <div class="xs-modal-footer">
                <button class="xs-btn" id="xsPromptCancel">取消</button>
                <button class="xs-btn xs-btn-p" id="xsPromptOk">确定</button>
            </div>
        </div>
    </div>
    <!-- 标量数组列（string[] / number[]）的多项编辑弹窗 -->
    <div class="xs-modal-overlay" id="arrEditModal">
        <div class="xs-modal-dialog xs-arr-dialog">
            <div class="xs-modal-header">
                <span class="xs-modal-title" id="arrEditTitle">编辑列表</span>
                <button class="xs-modal-close" id="arrEditClose" title="关闭">✕</button>
            </div>
            <div class="xs-modal-body xs-arr-body" id="arrEditBody"></div>
            <div class="xs-modal-footer">
                <button class="xs-btn" id="arrEditAddBtn" title="在末尾追加一项">+ 添加项</button>
                <span style="flex:1"></span>
                <button class="xs-btn" id="arrEditCancelBtn">取消</button>
                <button class="xs-btn xs-btn-p" id="arrEditSaveBtn">保存</button>
            </div>
        </div>
    </div>
</div>
<script nonce="{{nonce}}">
window.__EDITOR_CONFIG__ = { dataType: '{{dataType}}', msgType: '{{msgType}}' };
</script>
{{editorScripts}}
</body>
</html>
