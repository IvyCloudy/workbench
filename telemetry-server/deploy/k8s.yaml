# ============================================================
# K8s 部署清单（示例）
# 部署前请按公司规范修改：
#   - image:        换成你们公司镜像仓库地址
#   - namespace:    替换为目标命名空间
#   - secretName:   预先创建包含 TELEMETRY_TOKENS / MYSQL_PASSWORD 的 Secret
#   - service:      若需对外暴露，按公司网关方案接入 Ingress / SLB
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: workbench-telemetry-secret
  namespace: workbench
type: Opaque
stringData:
  TELEMETRY_TOKENS: "please-change-me-to-a-long-random-string"
  MYSQL_PASSWORD: "please-change-me"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: workbench-telemetry-config
  namespace: workbench
data:
  HOST: "0.0.0.0"
  PORT: "8080"
  RATE_LIMIT_PER_MINUTE: "600"
  MAX_BATCH_SIZE: "100"
  MAX_BODY_BYTES: "1048576"
  MYSQL_HOST: "mysql.workbench.svc.cluster.local"
  MYSQL_PORT: "3306"
  MYSQL_USER: "telemetry"
  MYSQL_DATABASE: "workbench_telemetry"
  MYSQL_POOL_SIZE: "10"
  NODE_ENV: "production"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workbench-telemetry
  namespace: workbench
  labels:
    app: workbench-telemetry
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: workbench-telemetry
  template:
    metadata:
      labels:
        app: workbench-telemetry
    spec:
      containers:
        - name: app
          image: your-registry/workbench-telemetry-server:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: workbench-telemetry-config
            - secretRef:
                name: workbench-telemetry-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: workbench-telemetry
  namespace: workbench
spec:
  selector:
    app: workbench-telemetry
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
---
# 每天凌晨 3 点跑日报；按需把输出落到日志中心或归档
apiVersion: batch/v1
kind: CronJob
metadata:
  name: workbench-telemetry-daily-stats
  namespace: workbench
spec:
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: stats
              image: your-registry/workbench-telemetry-server:1.0.0
              command: ["node", "scripts/stats-daily.js"]
              envFrom:
                - configMapRef:
                    name: workbench-telemetry-config
                - secretRef:
                    name: workbench-telemetry-secret
---
# 每天凌晨 4 点清理超过 90 天的数据
apiVersion: batch/v1
kind: CronJob
metadata:
  name: workbench-telemetry-cleanup
  namespace: workbench
spec:
  schedule: "0 4 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: your-registry/workbench-telemetry-server:1.0.0
              command: ["node", "scripts/cleanup.js", "--keep-days=90", "--batch=10000"]
              envFrom:
                - configMapRef:
                    name: workbench-telemetry-config
                - secretRef:
                    name: workbench-telemetry-secret
